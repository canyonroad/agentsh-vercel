# agentsh server configuration for Vercel Sandbox
# Optimized for Vercel's Firecracker VM environment

server:
  http:
    addr: "127.0.0.1:18080"
    read_timeout: "30s"
    write_timeout: "60s"
    max_request_size: "10MB"
  grpc:
    enabled: true
    addr: "127.0.0.1:9090"

auth:
  type: "none"

logging:
  level: "debug"
  format: "text"
  output: "stderr"

sessions:
  base_dir: "/var/lib/agentsh/sessions"
  max_sessions: 100
  default_timeout: "1h"
  default_idle_timeout: "15m"
  cleanup_interval: "5m"

audit:
  enabled: true
  storage:
    sqlite_path: "/var/lib/agentsh/events.db"

sandbox:
  enabled: true
  allow_degraded: true  # Allow running without FUSE (Firecracker blocks /dev/fuse)

  limits:
    max_memory_mb: 4096
    max_cpu_percent: 100
    max_processes: 256

  # FUSE: kernel module loaded but /dev/fuse returns EPERM (Firecracker restriction)
  # Enabled with deferred for graceful degradation
  fuse:
    enabled: true
    deferred: true
    audit:
      mode: "soft_delete"

  network:
    enabled: true
    intercept_mode: "all"
    proxy_listen_addr: "127.0.0.1:0"

  cgroups:
    enabled: false  # cgroups-v2 mounted read-only on Vercel (subtree_control not writable)

  seccomp:
    enabled: true
    execve:
      enabled: false  # ptrace handles execve; seccomp handles file I/O
    file_monitor:
      enabled: true
      enforce_without_fuse: true
      audit_under_fuse: true

  # Landlock: kernel-level path enforcement that resolves symlinks
  # Blocks symlink escapes (e.g., ln -sf /etc/shadow /tmp/link) at VFS level
  landlock:
    enabled: true
    allow_execute:
      - /usr/bin
      - /bin
      - /usr/local/bin
      - /opt/git/bin
    allow_read:
      - /etc/ssl/certs
      - /etc/resolv.conf
      - /etc/os-release
      - /etc/ld.so.cache
      - /etc/ld.so.conf
      - /lib
      - /lib64
      - /usr/lib
      - /usr/share
    allow_write: []
    deny_paths:
      - /etc/shadow
      - /etc/gshadow
      - /root/.ssh
      - /root/.aws
      - /root/.gnupg

  unix_sockets:
    enabled: false

  ptrace:
    enabled: true
    attach_mode: "children"
    on_attach_failure: "fail_closed"
    mask_tracer_pid: "off"
    trace:
      execve: true
      file: true
      network: true
      signal: true
    performance:
      seccomp_prefilter: true
      max_tracees: 500
      max_hold_ms: 5000

security:
  mode: auto
  strict: false
  warn_degraded: true

capabilities:
  allow: []

proxy:
  mode: "embedded"
  port: 0
  providers:
    anthropic: "https://api.anthropic.com"
    openai: "https://api.openai.com"

dlp:
  mode: "redact"
  patterns:
    email: true
    phone: true
    credit_card: true
    ssn: true
    api_keys: true
  custom_patterns:
    - name: openai_key
      display: OPENAI_KEY
      regex: "sk-[a-zA-Z0-9]{48,}"
    - name: anthropic_key
      display: ANTHROPIC_KEY
      regex: "sk-ant-[a-zA-Z0-9-]{95,}"
    - name: aws_access_key
      display: AWS_KEY
      regex: "AKIA[0-9A-Z]{16}"
    - name: github_pat
      display: GITHUB_TOKEN
      regex: "ghp_[a-zA-Z0-9]{36}"
    - name: github_oauth
      display: GITHUB_OAUTH
      regex: "gho_[a-zA-Z0-9]{36}"
    - name: jwt_token
      display: JWT
      regex: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    - name: private_key
      display: PRIVATE_KEY
      regex: "-----BEGIN [A-Z]+ PRIVATE KEY-----"
    - name: slack_token
      display: SLACK_TOKEN
      regex: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}"

policies:
  dir: "/etc/agentsh/policies"
  default_policy: "default"

approvals:
  enabled: false
  mode: "async"
  timeout: "5m"

metrics:
  enabled: true
  path: "/metrics"

health:
  path: "/health"
  readiness_path: "/ready"

development:
  disable_auth: true
  verbose_errors: true
